services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kopra-postgres
    environment:
      POSTGRES_USER: kopra
      POSTGRES_PASSWORD: kopra
      POSTGRES_DB: kopra
    ports:
      - "5433:5432"
    volumes:
      - kopra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kopra"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Aktifkan setelah Dockerfile tiap app dibuat (deploy VPS) ----
